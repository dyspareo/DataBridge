<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add FAD Hierarchy Recipient</title>
  <link rel="icon" type="image/png" href="../vg-icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f9fafb;
      color: #1f2937;
      line-height: 1.5;
    }
    .container {
      width: 100%;
      max-width: none;
      padding: 20px 40px;
    }
    .card {
      border: none;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      margin-bottom: 1.5rem;
      border-radius: 0.5rem;
      overflow: hidden;
    }
    .card-header {
      background-color: #f3f4f6;
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 1.5rem;
    }
    .card-header h3 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      color: #111827;
    }
    .card-body {
      padding: 1.5rem;
    }
    .form-label {
      font-weight: 500;
      color: #4b5563;
      margin-bottom: 0.5rem;
    }
    .form-control {
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
    }
    .form-control:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .readonly {
      background-color: #f3f4f6;
    }
    .required:after {
      content: " *";
      color: #ef4444;
    }
    .muted {
      color: #6b7280;
      font-size: 12px;
      margin-top: 4px;
    }
    .btn {
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
    }
    .btn-info-custom {
      background-color: #17a2b8;
      border-color: #17a2b8;
      color: white;
    }
    .btn-info-custom:hover {
      background-color: #138496;
      border-color: #117a8b;
      color: white;
    }
    .btn-success-custom {
      background-color: #28a745;
      border-color: #28a745;
      color: white;
    }
    .btn-success-custom:hover {
      background-color: #218838;
      border-color: #1e7e34;
      color: white;
    }
    #msg {
      margin-top: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="card">
      <div class="card-header">
        <h3><i class="bi bi-diagram-3"></i> Add FAD Hierarchy Recipient</h3>
      </div>
      <div class="card-body">
        <div class="alert alert-info">
          Click <b>Load Data</b> to auto-fill names from master tables. <b>status_id</b> defaults to <b>1</b>.
        </div>
        <form id="fadForm" class="needs-validation" novalidate>
          <div class="row mb-4">
            <div class="col-12 mb-3">
              <h5 class="border-bottom pb-2 mb-3">Plant & Department</h5>
            </div>
            <div class="col-md-6 mb-3">
              <label for="plant_name" class="form-label required">Plant Name</label>
              <input id="plant_name" class="form-control" placeholder="Auto-filled from master" />
            </div>
            <div class="col-md-6 mb-3">
              <label for="plant_code" class="form-label required">Plant Code</label>
              <input id="plant_code" class="form-control readonly" readonly />
            </div>
            <div class="col-md-6 mb-3">
              <label for="dept_name" class="form-label required">Department Name</label>
              <input id="dept_name" class="form-control" placeholder="Auto-filled from master" />
            </div>
            <div class="col-md-6 mb-3">
              <label for="dept_code" class="form-label required">Department Code</label>
              <input id="dept_code" class="form-control readonly" readonly />
            </div>
          </div>

          <div class="row mb-4">
            <div class="col-12 mb-3">
              <h5 class="border-bottom pb-2 mb-3">Point of Contact (LM) Details</h5>
            </div>
            <div class="col-md-4 mb-3">
              <label for="lcm_user" class="form-label required">LM User (Email/User ID)</label>
              <input id="lcm_user" class="form-control readonly" readonly />
              <div class="muted">Mapped to <code>lcm_user</code></div>
            </div>
          </div>

          <div class="row mb-4">
            <div class="col-12 mb-3">
              <h5 class="border-bottom pb-2 mb-3">CBS Details</h5>
            </div>
            <div class="col-md-6 mb-3">
              <label for="cbs_user1" class="form-label required">CBS User 1</label>
              <input id="cbs_user1" class="form-control readonly" readonly />
              <div class="muted">Mapped to <code>cbs_user1</code></div>
            </div>
            <div class="col-md-6 mb-3">
              <label for="cbs_user2" class="form-label required">CBS User 2</label>
              <input id="cbs_user2" class="form-control readonly" readonly />
              <div class="muted">Mapped to <code>cbs_user2</code></div>
            </div>
          </div>

          <div class="row mb-4">
            <div class="col-md-3 mb-3">
              <label for="status_id" class="form-label required">Status ID</label>
              <input id="status_id" class="form-control readonly" readonly value="1" />
            </div>
          </div>

          <div class="d-flex justify-content-between mt-4 pt-3 border-top">
            <button type="button" id="closeBtn" class="btn btn-secondary">
              <i class="bi bi-arrow-left"></i> Back
            </button>
            <button type="button" id="loadBtn" class="btn btn-info-custom">
              <i class="bi bi-download"></i> Load Data
            </button>
            <button type="submit" class="btn btn-success-custom">
              <i class="bi bi-check-circle"></i> Submit
            </button>
          </div>
        </form>
        <div id="msg" class="muted"></div>
      </div>
    </div>
  </div>

  <script src="../js/fad/fad-hierarchy-insert.js"></script>
</body>
</html>
