<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insert Department</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="container">
    <div class="card">
      <div class="card-header">
        <h3>Insert Department</h3>
      </div>
      <div class="card-body">
        <div id="alertBox" class="alert d-none"></div>
        <form id="insertForm" class="fade-in">
          <div class="table-responsive">
            <table class="table">
              <tbody>
                <tr>
                  <td><strong>Department Code</strong></td>
                  <td>
                    <input id="code" type="text" class="w-100" style="padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;" readonly />
                  </td>
                </tr>
                <tr>
                  <td><strong>Department Name</strong></td>
                  <td>
                    <input id="name" type="text" class="w-100" placeholder="Enter Department Name" style="padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;" required />
                  </td>
                </tr>
                <tr>
                  <td><strong>Department Short Name</strong></td>
                  <td>
                    <input id="deptShortName" type="text" class="w-100" placeholder="Enter Department Short Name" style="padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;" />
                  </td>
                </tr>
                <tr>
                  <td><strong>Department SAP Value</strong></td>
                  <td>
                    <input id="deptSapValue" type="text" class="w-100" placeholder="Enter Department SAP Value" style="padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;" />
                  </td>
                </tr>
                <tr style="display:none;">
                  <td><strong>Status ID</strong></td>
                  <td>
                    <input id="statusId" type="number" class="w-100" placeholder="Enter Status ID" style="padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;" />
                  </td>
                </tr>
                <tr style="display:none;">
                  <td><strong>Created Date</strong></td>
                  <td>
                    <input id="createdDate" type="datetime-local" class="w-100" style="padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;" />
                  </td>
                </tr>
                <tr style="display:none;">
                  <td><strong>Created By</strong></td>
                  <td>
                    <input id="createdBy" type="number" class="w-100" placeholder="Enter Created By (user id)" style="padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;" />
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div id="fabDeptForm" class="d-none">
            <div class="field" style="margin-bottom:12px;">
              <label class="field-label">
                Department Name <span class="req">*</span>
                <span class="db-col">department_name</span>
              </label>
              <input type="text" id="department_name" class="w-100" placeholder="e.g. Finance & Accounts" style="padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;" />
            </div>

            <div class="field" style="margin-bottom:12px;">
              <label class="field-label">
                WBS Department Code <span class="req">*</span>
                <span class="db-col">wbs_department_code</span>
              </label>
              <input type="text" id="wbs_department_code" class="w-100" placeholder="e.g. JKS" style="padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;" />
            </div>

            <div class="field" style="margin-bottom:12px;">
              <label class="field-label">
                Status <span class="db-col">status_id</span>
              </label>
              <select id="status_id" class="w-100" style="padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;">
                <option value="1">1 — Active</option>
                <option value="0">0 — Inactive</option>
              </select>
            </div>

            <div class="field" style="margin-bottom:12px;">
              <label class="field-label">
                Created Date <span class="db-col">created_date</span>
              </label>
              <input type="text" id="created_date" class="w-100" placeholder="Auto — now()" disabled style="padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;" />
            </div>

            <div class="field" style="margin-bottom:12px;">
              <label class="field-label">
                Created By <span class="db-col">created_by</span>
              </label>
              <input type="number" id="created_by" class="w-100" placeholder="Auto — session user" disabled style="padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;" />
            </div>
          </div>

          <div class="d-flex justify-content-between mt-4">
            <div>
              <button id="btnBackHome" type="button" class="btn btn-outline-secondary">Back to Home</button>
              <button id="btnCancel" type="button" class="btn btn-outline-secondary" style="margin-left:8px;">Cancel</button>
            </div>
            <button id="btnOk" type="submit" class="btn btn-success" style="background-color:#28a745;border-color:#28a745;color:white;">Insert</button>
          </div>
        </form>
      </div>
      <div class="card-footer text-center">Fill required fields and confirm to insert</div>
    </div>
  </header>

  <script src="./js/department-insert.js"></script>
</body>
</html>
