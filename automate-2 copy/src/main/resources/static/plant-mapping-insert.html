<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="./vg-icon.png" />
  <title>Insert Initiator–Plant Mapping</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    .container { max-width: 760px; margin: 24px auto; background:#fff; border-radius:10px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.08); font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    h3 { margin:0 0 12px; font-size:22px; color:#111827; }
    .row { display:flex; gap:16px; align-items:center; margin-bottom:14px; }
    .row label { width:220px; font-weight:700; color:#374151; font-size:14px; }
    .row input[readonly] { background:#f9fafb; color:#6b7280; }
    .row input { flex:1; padding:10px 12px; border:1px solid #e5e7eb; border-radius:8px; font-size:14px; }
    .hint { font-size:12px; color:#6b7280; margin-left:220px; margin-top:-8px; margin-bottom:12px; }
    .actions { display:flex; justify-content:flex-end; gap:10px; margin-top:16px; }
    .badge { background:#d1fae5; color:#065f46; padding:6px 10px; border-radius:999px; font-weight:700; font-size:12px; }
    .alert { padding:10px 12px; border-radius:8px; font-weight:600; margin-bottom:12px; display:none; }
    .alert-success { background:#dcfce7; border:1px solid #bbf7d0; color:#166534; }
    .alert-error { background:#fee2e2; border:1px solid #fecaca; color:#b91c1c; }
  </style>
</head>
<body>
  <div class="container">
    <h3>Insert Initiator–Plant Mapping <span class="badge">App: FA (3)</span></h3>
    <div id="alert" class="alert"></div>

    <div class="row">
      <label>Plant Code</label>
      <input id="plantCode" type="text" placeholder="e.g. 1004" />
    </div>
    <div class="row">
      <label>User Login</label>
      <input id="userLoginName" type="text" placeholder="e.g. john.doe" />
    </div>

    <div class="actions">
      <a href="./index.html" class="btn btn-outline-secondary">Back</a>
      <button id="btnInsert" class="btn btn-success" style="background-color:#28a745 !important;border-color:#28a745 !important;color:white !important;padding:6px 12px;border-radius:4px;cursor:pointer;">Insert Mapping</button>
    </div>
  </div>

  <script src="./js/plant-mapping-insert.js"></script>
</body>
</html>
