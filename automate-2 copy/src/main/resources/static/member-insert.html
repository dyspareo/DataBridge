<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insert orm_member</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    .container { max-width: 840px; margin: 24px auto; background:#fff; border-radius:10px; padding:20px; box-shadow:0 8px 24px rgba(0,0,0,0.08); font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    h3 { font-size: 22px; line-height: 28px; letter-spacing: 0.2px; color:#111827; }
    .row { display:flex; gap:16px; margin-bottom:14px; align-items:center; }
    .row label { width: 240px; font-weight:700; color:#374151; font-size:14px; }
    .row input, .row select { flex:1; padding:10px 12px; border:1px solid #e5e7eb; border-radius:8px; font-size:14px; }
    .row input[readonly], .row select[disabled] { background:#f9fafb; color:#6b7280; }
    .actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
    .alert { padding:10px 12px; border-radius:8px; font-weight:600; margin-bottom:12px; display:none; }
    .alert-success { background:#dcfce7; border:1px solid #bbf7d0; color:#166534; }
    .alert-error { background:#fee2e2; border:1px solid #fecaca; color:#b91c1c; }
  </style>
</head>
<body>
  <div class="container">
    <h3 style="margin-top:0;">Insert orm_member</h3>
    <div id="alert" class="alert"></div>

    <div class="row">
      <label>orm_master_id</label>
      <input id="ormMasterId" type="number" value="4" readonly />
    </div>
    <div class="row">
      <label>orm_instance_id</label>
      <select id="ormInstanceId">
        <option value="1">Treasury</option>
        <option value="2">R2R</option>
        <option value="3">FA</option>
        <option value="4">P2P</option>
        <option value="5">O2C</option>
      </select>
    </div>
    <div class="row">
      <label>user_id</label>
      <input id="userId" type="number" placeholder="Auto-filled from query ?userId=..." />
    </div>
    <div class="row">
      <label>user_type (role)</label>
      <select id="userType"></select>
    </div>
    <div class="row" style="display:none;">
      <label>status_id</label>
      <input id="statusId" type="number" value="1" readonly />
    </div>
    <div class="row" style="display:none;">
      <label>created_by</label>
      <input id="createdBy" type="number" value="2" readonly />
    </div>
    <div class="row" style="display:none;">
      <label>created_date</label>
      <input id="createdDate" type="text" readonly />
    </div>

    <div class="actions">
      <button id="btnInsert" class="btn btn-success" style="background-color:#28a745;border-color:#28a745;color:white;">Insert</button>
    </div>
  </div>

  <script src="./js/member-insert.js"></script>
</body>
</html>
